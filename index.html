<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: sans-serif;
            background: #0f0f0f;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        h1 { font-size: 24px; margin-bottom: 8px; color: #60a5fa; }
        p.sub { color: #888; font-size: 14px; margin-bottom: 2rem; }
        .box {
            width: 100%;
            max-width: 600px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1.5rem;
        }
        textarea {
            width: 100%;
            height: 100px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            resize: none;
        }
        button {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled { background: #444; }
        .answer {
            margin-top: 1.5rem;
            background: #2a2a2a;
            border-radius: 8px;
            padding: 1rem;
            display: none;
        }
        .answer-label { font-size: 12px; color: #60a5fa; margin-bottom: 8px; }
        pre {
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<h1>Coding AI Assistant</h1>
<p class="sub">Ask any coding question — Python, JS, HTML, SQL, React</p>

<div class="box">
    <textarea id="q" placeholder="Example: How do I reverse a list in Python?"></textarea>
    <button id="btn" onclick="ask()">Ask AI</button>
    <div class="answer" id="ans">
        <div class="answer-label">Answer</div>
        <pre id="text"></pre>
    </div>
</div>

<script>
const TOKEN = "hf_ceOFjXfYetakTSmWlDOSjOGJtXGyPYDTr";
const MODEL = "Liffix/coding-ai-model";

async function ask() {
    const question = document.getElementById("q").value.trim();
    if (!question) return;

    const btn = document.getElementById("btn");
    const ans = document.getElementById("ans");
    const text = document.getElementById("text");

    btn.disabled = true;
    btn.textContent = "Thinking...";
    ans.style.display = "block";
    text.textContent = "Loading...";

    try {
        const res = await fetch(
            `https://api-inference.huggingface.co/models/${MODEL}`,
            {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: `### Question:\n${question}\n\n### Answer:\n`,
                    parameters: {
                        max_new_tokens: 200,
                        return_full_text: false,
                        temperature: 0.7
                    }
                })
            }
        );

        const data = await res.json();

        if (data.error) {
            if (data.error.includes("loading")) {
                text.textContent = "Model is warming up. Wait 20 seconds and tap Ask AI again.";
            } else {
                text.textContent = "Error: " + data.error;
            }
        } else {
            text.textContent = data[0]?.generated_text?.trim() || "No answer generated";
        }

    } catch(e) {
        text.textContent = "Connection error. Check internet and try again.";
    }

    btn.disabled = false;
    btn.textContent = "Ask AI";
}
</script>

</body>
</html>
