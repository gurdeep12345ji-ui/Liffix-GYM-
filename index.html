<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: sans-serif;
            background: #0f0f0f;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #60a5fa;
        }

        p.subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 2rem;
        }

        .chat-box {
            width: 100%;
            max-width: 600px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1.5rem;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            resize: none;
        }

        button {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover { background: #1d4ed8; }
        button:disabled { background: #444; cursor: not-allowed; }

        .answer-box {
            margin-top: 1.5rem;
            background: #2a2a2a;
            border-radius: 8px;
            padding: 1rem;
            display: none;
        }

        .answer-label {
            font-size: 12px;
            color: #60a5fa;
            margin-bottom: 8px;
        }

        pre {
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-word;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Coding AI Assistant</h1>
    <p class="subtitle">Ask any coding question — Python, JS, HTML, SQL, React</p>

    <div class="chat-box">
        <textarea
            id="question"
            placeholder="Example: How do I reverse a list in Python?">
        </textarea>

        <button id="askBtn" onclick="askAI()">Ask AI</button>

        <div class="loading" id="loading">
            Thinking...
        </div>

        <div class="answer-box" id="answerBox">
            <div class="answer-label">Answer</div>
            <pre id="answerText"></pre>
        </div>
    </div>

    <script>
        async function askAI() {
            const question = document.getElementById("question").value.trim();

            if (!question) {
                alert("Please type a question first!");
                return;
            }

            const btn = document.getElementById("askBtn");
            const loading = document.getElementById("loading");
            const answerBox = document.getElementById("answerBox");
            const answerText = document.getElementById("answerText");

            btn.disabled = true;
            btn.textContent = "Thinking...";
            loading.style.display = "block";
            answerBox.style.display = "none";

            try {
                const response = await fetch("/api/ask", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();

                answerText.textContent = data.answer;
                answerBox.style.display = "block";

            } catch (error) {
                answerText.textContent = "Error connecting to AI. Please try again.";
                answerBox.style.display = "block";
            }

            btn.disabled = false;
            btn.textContent = "Ask AI";
            loading.style.display = "none";
        }
    </script>

</body>
</html>
