<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liffix Gym</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: #020617;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #22c55e;
}

.nav-btns button {
  margin-left: 10px;
  padding: 8px 15px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.login-btn { background: #2563eb; color: white; }
.register-btn { background: #22c55e; color: white; }

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  color: #94a3b8;
}

.cta {
  margin-top: 20px;
  padding: 12px 25px;
  background: #22c55e;
  border: none;
  border-radius: 5px;
  color: black;
  font-weight: bold;
}

/* FEATURES */
.features {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

/* AUTH MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.auth-box {
  background: #020617;
  padding: 30px;
  border-radius: 10px;
  width: 320px;
}

.auth-box h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: none;
}

.auth-btn {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  border-radius: 5px;
  font-weight: bold;
}

.google-btn {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: white;
  color: black;
  border-radius: 5px;
  cursor: pointer;
}

.switch {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  color: #60a5fa;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">Liffix Gym</div>
  <div class="nav-btns">
    <button class="login-btn" onclick="openAuth('login')">Login</button>
    <button class="register-btn" onclick="openAuth('register')">Register</button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Transform Your Body with AI 💪</h1>
  <p>Smart workout plans, diet tracking & supplement guide</p>
  <button class="cta" onclick="openAuth('register')">Get Started</button>
</section>

<!-- FEATURES -->
<section class="features">
  <div class="card">🏋️ AI Workout Plans</div>
  <div class="card">🥗 Diet & Nutrition Tracker</div>
  <div class="card">💊 Supplement Guide</div>
  <div class="card">📊 Progress Tracking</div>
</section>

<!-- AUTH MODAL -->
<div class="modal" id="authModal">
  <div class="auth-box">
    <h2 id="authTitle">Login</h2>

    <input type="text" id="name" placeholder="Name (Register only)">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button class="auth-btn" onclick="submitAuth()">Login</button>

    <div class="google-btn" onclick="googleLogin()">
      🔵 Continue with Google
    </div>

    <div class="switch" onclick="toggleAuth()">Switch to Register</div>
  </div>
</div>

<script>
let isLogin = true;

function openAuth(type) {
  document.getElementById('authModal').style.display = 'flex';
  isLogin = type === 'login';
  updateAuthUI();
}

function updateAuthUI() {
  document.getElementById('authTitle').innerText = isLogin ? "Login" : "Register";
  document.querySelector('.auth-btn').innerText = isLogin ? "Login" : "Register";
  document.getElementById('name').style.display = isLogin ? "none" : "block";
  document.querySelector('.switch').innerText = isLogin ? "Switch to Register" : "Switch to Login";
}

function toggleAuth() {
  isLogin = !isLogin;
  updateAuthUI();
}

function submitAuth() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  if(!email || !password){
    alert("Fill all fields!");
    return;
  }

  if(isLogin){
    alert("Login Success 🚀");
  } else {
    alert("Register Success 🎉");
  }
}

function googleLogin() {
  alert("Google Auth Coming Soon 🚀 (connect with Firebase or Supabase)");
}

// Close modal on outside click
window.onclick = function(e) {
  const modal = document.getElementById('authModal');
  if (e.target == modal) {
    modal.style.display = "none";
  }
}
</script>

</body>
</html>
