<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Register</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: white;
    padding: 30px 40px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    width: 350px;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
  }

  input[type="text"], input[type="email"], input[type="password"] {
    width: 100%;
    padding: 12px;
    margin: 8px 0 15px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #007bff;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background: #0056b3;
  }

  .switch {
    text-align: center;
    margin-top: 15px;
  }

  .switch span {
    color: #007bff;
    cursor: pointer;
  }

  .error {
    color: red;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .success {
    color: green;
    font-size: 14px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<div class="container">
  <h2 id="form-title">Login</h2>
  
  <div id="message"></div>

  <form id="auth-form">
    <input type="text" id="username" placeholder="Username" required>
    <input type="email" id="email" placeholder="Email (register only)">
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit" id="submit-btn">Login</button>
  </form>

  <div class="switch">
    <span id="switch-link">Don't have an account? Register</span>
  </div>
</div>

<script>
const formTitle = document.getElementById('form-title');
const authForm = document.getElementById('auth-form');
const submitBtn = document.getElementById('submit-btn');
const switchLink = document.getElementById('switch-link');
const emailInput = document.getElementById('email');
const message = document.getElementById('message');

let isLogin = true;

// Switch between login and register
switchLink.addEventListener('click', () => {
  isLogin = !isLogin;
  if(isLogin){
    formTitle.textContent = "Login";
    submitBtn.textContent = "Login";
    emailInput.style.display = "none";
    switchLink.textContent = "Don't have an account? Register";
    message.textContent = "";
  } else {
    formTitle.textContent = "Register";
    submitBtn.textContent = "Register";
    emailInput.style.display = "block";
    switchLink.textContent = "Already have an account? Login";
    message.textContent = "";
  }
});

// Handle form submit
authForm.addEventListener('submit', (e) => {
  e.preventDefault();
  
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  // Simple validation
  if(!username || !password || (!isLogin && !email)){
    message.textContent = "Please fill all fields!";
    message.className = "error";
    return;
  }

  if(!isLogin){
    message.textContent = `Registered successfully! Welcome, ${username}`;
    message.className = "success";
    authForm.reset();
    return;
  }

  // Login simulation
  message.textContent = `Logged in successfully! Welcome, ${username}`;
  message.className = "success";
  authForm.reset();
});
</script>

</body>
</html>
